# version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg12
    container_name: timescaledb
    restart: unless-stopped
    ports:
      - "${TIMESCALE_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5    

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    container_name: api
    command: pnpm run start
    depends_on:
      db-seed:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
      engine:
        condition: service_started
    ports:
      - "${API_PORT}:3000"
    env_file:
      - ./api/.env
    environment:
      # OVERRIDES: Connect to containers, not localhost
      - POSTGRES_HOST=timescaledb
      - REDIS_HOST=redis

  ws:
    build:
      context: .
      dockerfile: ws/Dockerfile
    restart: unless-stopped
    container_name: ws
    depends_on:
      redis:
        condition: service_started
      engine:
        condition: service_started
    ports:
      - "${WS_PORT}:3001"
    env_file:
      - ./ws/.env
    environment:
      # OVERRIDES
      - REDIS_HOST=redis

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    restart: unless-stopped
    container_name: engine
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./engine/.env
    environment:
      # OVERRIDES
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
      - WITH_SNAPSHOT=false
      - POSTGRES_HOST=timescaledb
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=5432
      # We don't override DB here as Engine usually uses Redis, 

  db-seed:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: db-seed
    command: pnpm run db:seed
    env_file:
      - ./db/.env
    environment:
      # OVERRIDES
      - POSTGRES_HOST=timescaledb
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started

  db-worker:
    build:
      context: .
      dockerfile: db/Dockerfile
    restart: unless-stopped
    container_name: db-worker
    command: pnpm run start
    env_file:
      - ./db/.env
    environment:
      # OVERRIDES
      - POSTGRES_HOST=timescaledb
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      db-seed:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started

  db-cron:
    build:
      context: .
      dockerfile: db/Dockerfile
    restart: unless-stopped
    container_name: db-cron
    command: pnpm run refresh:views
    env_file:
      - ./db/.env
    environment:
      # OVERRIDES
      - POSTGRES_HOST=timescaledb
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      db-seed:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:3002"
    depends_on:
      api:
        condition: service_started
      ws:
        condition: service_started
    env_file:
      - ./frontend/.env
    environment:
      - HTTP_PROXY_URL=http://api:3000/api/v1

  mm:
    build:
      context: .
      dockerfile: mm/Dockerfile
    restart: unless-stopped
    container_name: mm
    command: pnpm run start
    depends_on:
      api:
        condition: service_started
    env_file:
      - ./mm/.env
    environment:
      # OVERRIDES
      # MM running in Docker needs to talk to API container directly
      - API_BASE_URL=http://api:3000
      
volumes:
  timescale-data:
